<div class="container">


  <table mat-table [dataSource]="deckListSrc">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> {{ 'PAGES.HOME.DECKS.ID' | translate }} </th>
      <td mat-cell *matCellDef="let deckItem"> {{ deckItem.deckId }} </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> {{ 'PAGES.HOME.DECKS.NAME' | translate }} </th>
      <td mat-cell *matCellDef="let deckItem"> {{ deckItem.name }} </td>
    </ng-container>

    <ng-container matColumnDef="newCardsPerDay">
      <th mat-header-cell *matHeaderCellDef> {{ 'PAGES.HOME.DECKS.NEW_PER_DAY' | translate }} </th>
      <td mat-cell *matCellDef="let deckItem"> {{ deckItem.newCardsPerDay }} </td>
    </ng-container>

    <ng-container matColumnDef="newCardsLearned">
      <th mat-header-cell *matHeaderCellDef> {{ 'PAGES.HOME.DECKS.NEW_LEARNED' | translate }} </th>
      <td mat-cell *matCellDef="let deckItem"> {{ deckItem.newCardsLearned }} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="clickDeckRow(row)"></tr>
  </table>

</div>
