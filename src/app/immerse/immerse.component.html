<div class="video-container">

  <!-- 视频播放器  -->
  <video #videoPlayer [src]="videoSrc" controls width="640" (loadedmetadata)="onVideoLoaded()"></video>

  <!-- 视频文件选择按钮  -->
  <div class="video-overlay">

    <input #fileInput type="file" (change)="onFileSelected($event)" accept="video/*" style="display: none">
    <!-- 点击触发#fileInput -->
    <button mat-icon-button class="change-video-btn" (click)="fileInput.click()" matTooltip="选择视频文件">
      <mat-icon>folder_open</mat-icon>
    </button>
  </div>


</div>
