<div class="dictionary-page">
  <mat-card class="context-card">
    <mat-card-header>
      <div mat-card-avatar class="avatar-icon">
        <mat-icon>menu_book</mat-icon>
      </div>
      <mat-card-title>当前选中文本</mat-card-title>
      <mat-card-subtitle>占位符 · 语言/来源</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="selected-text">
        <div class="label">文本</div>
        <div class="value">{{ selectedText() }}</div>
      </div>
      <mat-divider></mat-divider>
      <div class="context-sentence">
        <div class="label">上下文句子</div>
        <div class="value">{{ contextSentence() }}</div>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="meanings-card">
    <mat-card-header>
      <mat-card-title>释义列表</mat-card-title>
      <mat-card-subtitle>{{ entry.word }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="phonetic-row">
        <div class="phonetic">{{ entry.phoneticSymbol.join(' / ') }}</div>
      </div>
      <div class="meaning-scroll" #meaningScroll>
        @for (sense of entry.senses; track $index) {
          <div class="sense-section" #senseSection>
            <div class="meaning-cards">
              @for (def of sense.definitions; track $index) {
                <app-meaning-card
                  [item]="def"
                  [index]="$index + 1"
                  [posLabel]="sense.partOfSpeech"
                  (add)="onAddCard($event, sense.partOfSpeech)"
                ></app-meaning-card>
              }
            </div>
          </div>
        }
      </div>
    </mat-card-content>
  </mat-card>
</div>
